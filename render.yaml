services:
  - type: web
    name: classsync-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/canvas-tracker-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: YOUR_RENDER_INTERNAL_DB_URL
      - key: SPRING_DATASOURCE_USERNAME
        value: YOUR_DB_USERNAME
      - key: SPRING_DATASOURCE_PASSWORD
        value: YOUR_DB_PASSWORD
      - key: SPRING_MAIL_USERNAME
        value: t51092567@gmail.com
      - key: SPRING_MAIL_PASSWORD
        value: YOUR_GMAIL_APP_PASSWORD
      - key: JWT_SECRET
        value: YOUR_JWT_SECRET
      - key: CANVAS_API_TOKEN
        value: YOUR_CANVAS_TOKEN
      - key: CANVAS_API_BASE_URL
        value: montclair.instructure.com