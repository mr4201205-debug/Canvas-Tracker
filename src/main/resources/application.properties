spring.application.name=class-sync
spring.config.import=optional:classpath:application-secrets.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/canvas_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

resend.api.key=${RESEND_API_KEY}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

canvas.api.token=${CANVAS_API_TOKEN:}
canvas.api.baseUrl=${CANVAS_API_BASE_URL:}


jwt.secret=${JWT_SECRET:}


app.backend-url=${BACKEND_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}